    description: Management
    mode: access
    access_vlan: 110

  Ethernet0/1:
    description: Link HQ-DSW1
    channel_group:
      id: 1
      mode: active

  Ethernet0/2:
    description: Link HQ-DSW1
    channel_group:
      id: 1
      mode: active

  Ethernet0/3:
    description: Link HQ-DSW2
    channel_group:
      id: 2
      mode: active

  Ethernet1/0:
    description: Link HQ-DSW2
    channel_group:
      id: 2
      mode: active

  Ethernet1/1:
    description: PC1
    mode: access
    access_vlan: 10
    portfast: true
    bpduguard: true

  Ethernet1/2:
    description: PC2
    mode: access
    access_vlan: 10
    portfast: true
    bpduguard: true
