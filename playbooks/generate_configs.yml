- name: Generate switch configs
  hosts: HQ-ASW1:HQ-ASW2:HQ-ASW3:HQ-ASW4:HQ-ASW5:HQ-ASW6:HQ-ASW7:HQ-ASW8:HQ-ASW9:HQ-DSW1:HQ-DSW2:HQ-DSW3:HQ-DSW4:HQ-CSW1
  gather_facts: false

  tasks:
    - name: Create local directory
      run_once: true
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ playbook_dir }}/generated_configs"
        state: directory
        mode: 0755

    - name: Ping management IP address
      ansible.builtin.command: "ping -c 3 {{ ansible_host }}"
      register: ping_result
      ignore_errors: true

    - name: Generate configuration file
      delegate_to: localhost
      template:
        src: "templates/{{ config_template }}"
        dest: "{{ playbook_dir }}/generated_configs/{{ inventory_hostname }}.ios"

    - name: Push configs
      cisco.ios.ios_config:
        src: "generated_configs/{{ inventory_hostname }}.ios"
        save_when: modified
