- name: Generate switch configs
  hosts: HQ-ASW1:HQ-ASW2:HQ-DSW1:HQ-DSW2:HQ-CSW1
  gather_facts: false

  tasks:
    - name: Create local directory
      run_once: true
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ playbook_dir }}/generated_configs"
        state: directory
        mode: 0755

    - name: Generate configuration file
      delegate_to: localhost
      template:
        src: "templates/{{ config_template }}"
        dest: "{{ playbook_dir }}/generated_configs/{{ inventory_hostname }}.ios"

    - name: Push configs
      cisco.ios.ios_config:
        src: "generated_configs/{{ inventory_hostname }}.ios"
        save_when: modified
