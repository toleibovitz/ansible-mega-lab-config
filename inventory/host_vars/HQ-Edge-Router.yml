hostname: HQ-Edge-Router

users:
  - username: admin
    privilege_level: 15
    password: TestPassword123!

interfaces:
  - name: Ethernet0/0
    description: Management
    ip_address: 192.168.110.2
    mask: 255.255.255.0
    shutdown: false
    advertise: true
    interface_type: management

  - name: Ethernet0/1
    description: HQ-Router1
    ip_address: 10.255.255.1
    mask: 255.255.255.254
    shutdown: false
    advertise: true
    interface_type: internal

  - name: Ethernet0/2
    description: HQ-Router2
    ip_address: 10.255.255.3
    mask: 255.255.255.254
    shutdown: false
    advertise: true
    interface_type: internal

  - name: Ethernet0/3
    description: Core-Router
    ip_address: 10.255.255.46
    mask: 255.255.255.254
    shutdown: false
    advertise: true
    interface_type: external

routing:
  protocol: ospf
  process_id: 1
  area: 0
  default_information: true
  router_id: "{{ (interfaces | selectattr('name', 'equalto', 'Loopback0') | list | first).ip_address }}"
  vlans: "{{ default_vlans }}"
  bgp:
    as: 65000
    advertise_internal_networks: false
    neighbors:
      - as: 65001
        ip_address: 10.255.255.47
